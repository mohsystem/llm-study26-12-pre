spring.application.name=user-management

# H2 in-memory
spring.datasource.url=jdbc:h2:mem:umdb;DB_CLOSE_DELAY=-1;DB_CLOSE_ON_EXIT=FALSE
spring.datasource.driverClassName=org.h2.Driver
spring.datasource.username=sa
spring.datasource.password=

spring.jpa.hibernate.ddl-auto=update
spring.jpa.show-sql=true
spring.jpa.properties.hibernate.format_sql=true

# H2 console (dev only)
spring.h2.console.enabled=true
spring.h2.console.path=/h2-console

# Server
server.port=8080

# Admin bootstrap (test setup)
app.bootstrap.admin.enabled=true
app.bootstrap.admin.email=admin@example.com
app.bootstrap.admin.first-name=Admin
app.bootstrap.admin.last-name=User
app.bootstrap.admin.password=admin123

# JWT
app.jwt.secret=change-me-change-me-change-me-32-chars-min
app.jwt.access-ttl-seconds=900
app.jwt.refresh-ttl-seconds=1209600

# LDAP validation
app.ldap.mock=true

# Only used when app.ldap.mock=false
app.ldap.url=ldap://localhost:389
app.ldap.base-dn=dc=example,dc=com
app.ldap.user-dn=cn=admin,dc=example,dc=com
app.ldap.password=admin

# Search settings (adjust for your directory)
app.ldap.user-search-base=ou=people
app.ldap.user-object-class=person